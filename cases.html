<!DOCTYPE html>
<html>
<head>
  <title>Cases</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="checkLogin(); loadCases();">

  <div class="topbar">
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    Case Management
  </div>

  <div class="sidebar" id="sidebar">
    <button onclick="window.location='dashboard.html'">Dashboard</button>
    <button onclick="window.location='cases.html'">Cases</button>
    <button onclick="window.location='users.html'">User Management</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <div class="card">
      <h3>Create Case</h3>

      <input id="caseTitle" placeholder="Title">
      <input id="caseDesc" placeholder="Description">

      <button onclick="createCase()">Create Case</button>
    </div>

    <input placeholder="Search..." onkeyup="loadCases(this.value)">

    <div id="caseList"></div>

  </div>

  <script src="app.js"></script>

</body>
</html>
