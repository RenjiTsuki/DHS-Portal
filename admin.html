<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a2a;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #111f2e;
      padding: 20px;
      height: 100vh;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      border-radius: 4px;
      border: none;
      width: 100%;
    }

    button {
      background: #00bcd4;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0097a7;
    }

    .card {
      background: #16283d;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body onload="checkAuth(); loadUsers();">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Admin Panel</h3>

    <a href="dashboard.html">Dashboard</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>👤 Create Agent</h2>

    <input id="newAgentId" placeholder="Agent ID (e.g. OIG-1002)">
    <input id="newEmail" placeholder="Email (optional)">
    <input id="newPassword" placeholder="Password">

    <button onclick="createUser()">Create Agent</button>

    <h3>📋 Existing Agents</h3>
    <div id="users"></div>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>

  <script>
    // CREATE USER
    function createUser() {
      const agentId = document.getElementById("newAgentId").value;
      const email = document.getElementById("newEmail").value;
      const password = document.getElementById("newPassword").value;

      if (!agentId || !password) {
        alert("Agent ID and password required");
        return;
      }

      db.collection("agentIDs").add({
        agentId: agentId,
        email: email || "",
        password: password,
        role: "agent"
      }).then(() => {
        alert("Agent created!");
        loadUsers();
      });
    }

    // LOAD USERS
    function loadUsers() {
      const container = document.getElementById("users");

      db.collection("agentIDs").get().then(snapshot => {
        let html = "";

        snapshot.forEach(doc => {
          const u = doc.data();

          html += `
            <div class="card">
              <b>${u.agentId}</b><br>
              ${u.email || "No email"}<br>
              Role: ${u.role}
            </div>
          `;
        });

        container.innerHTML = html;
      });
    }
  </script>

</body>
</html>
