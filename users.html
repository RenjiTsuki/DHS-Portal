<!DOCTYPE html>
<html>
<head>
  <title>Users</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="checkAuth(); loadUsers(); loadRoles()">

<div class="sidebar">
  <h2>DHS | OIG</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="users.html">Users</a>
  <a href="cases.html">Cases</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>User Management</h1>

<div class="card">
  <h3>Create User</h3>
  <input id="newUser" placeholder="Username">
  <input id="newPass" placeholder="Password">
  <select id="role"></select>
  <button onclick="createUser()">Create</button>
</div>

<div class="card">
  <h3>Create Role</h3>
  <input id="roleName" placeholder="Role Name">

  <label><input type="checkbox" class="perm" value="manage_users"> Manage Users</label>
  <label><input type="checkbox" class="perm" value="manage_cases"> Manage Cases</label>

  <button onclick="createRole()">Create Role</button>

  <div id="roleList"></div>
</div>

<div class="card">
  <h3>Users</h3>
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Role</th>
        <th>Warnings</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userList"></tbody>
  </table>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
