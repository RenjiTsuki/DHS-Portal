<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="checkLogin()">

  <div class="header">
    DHS | Office of the Inspector General Management System
  </div>

  <div class="nav">
    <span>Dashboard</span>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <div class="card">
      <h2>Welcome</h2>
      <p id="role"></p>
    </div>

    <div id="adminPanel"></div>

    <div class="card">
      <button onclick="window.location='cases.html'">Go to Cases</button>
    </div>

  </div>

  <script src="app.js"></script>

  <script>
    const user = getUser();
    document.getElementById("role").innerText = "Role: " + user.role;

    if (user.role === "admin") {
      document.getElementById("adminPanel").innerHTML = `
        <div class="card">
          <h3>Admin Panel</h3>
          <p>Create system controls here</p>
        </div>
      `;
    }
  </script>

</body>
</html>
