<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body onload="checkAuth()">

<div class="sidebar">
<a href="dashboard.html">Dashboard</a>
<a href="users.html">Users</a>
<a href="cases.html">Cases</a>
<a onclick="logout()">Logout</a>
</div>

<div class="main">

<div class="topbar">Enterprise Operations Dashboard</div>

<div class="card">
<h3>System Stats</h3>
<p>Total Users: <span id="userCount"></span></p>
<p>Total Cases: <span id="caseCount"></span></p>
</div>

<div class="card">
<h3>Activity Overview</h3>
<p>System running normally</p>
</div>

</div>

<script>
document.getElementById("userCount").innerText =
(JSON.parse(localStorage.getItem("users")) || []).length;

document.getElementById("caseCount").innerText =
(JSON.parse(localStorage.getItem("cases")) || []).length;
</script>

<script src="app.js"></script>
</body>
</html>
